<!-- ─── Sidebar desktop (fijo a la izquierda) ─── -->
<nav
  class="fixed left-0 top-0 h-full z-50 hidden lg:flex flex-col justify-between px-6 py-10 w-[72px] hover:w-56 transition-all duration-300 ease-in-out bg-[#0a0a0a] border-r border-white/[0.06] group/nav overflow-hidden">

  <!-- Logo / iniciales -->
  <div class="flex items-center gap-3 mb-12 shrink-0">
    <div
      class="w-9 h-9 rounded-lg bg-indigo-500/20 border border-indigo-500/30 flex items-center justify-center shrink-0">
      <span class="text-[13px] font-medium text-indigo-400 tracking-tight">JA</span>
    </div>
    <span
      class="text-[13px] font-light text-white/60 whitespace-nowrap opacity-0 group-hover/nav:opacity-100 transition-opacity duration-200 delay-100">
      Javier Alejandro
    </span>
  </div>

  <!-- Links -->
  <ul class="flex flex-col gap-1 flex-1">

    <li *ngFor="let item of navItems">
      <a [routerLink]="item.path"
         routerLinkActive="nav-active"
         [routerLinkActiveOptions]="item.exact ? { exact: true } : { exact: false }"
         class="nav-link flex items-center gap-3 px-2 py-2.5 rounded-lg transition-all duration-200 cursor-pointer group/item">

        <!-- Ícono -->
        <div class="w-5 h-5 shrink-0 flex items-center justify-center">
          <ng-container [ngSwitch]="item.id">
            <svg *ngSwitchCase="'home'" class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="1.5"
                 viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
            </svg>
            <svg *ngSwitchCase="'about'" class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="1.5"
                 viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
            </svg>
            <svg *ngSwitchCase="'projects'" class="w-[18px] h-[18px]" fill="none" stroke="currentColor"
                 stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/>
            </svg>
            <svg *ngSwitchCase="'skills'" class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="1.5"
                 viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/>
            </svg>
            <svg *ngSwitchCase="'contact'" class="w-[18px] h-[18px]" fill="none" stroke="currentColor"
                 stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
            </svg>
          </ng-container>
        </div>

        <!-- Label -->
        <span
          class="text-[13px] font-light whitespace-nowrap opacity-0 group-hover/nav:opacity-100 transition-opacity duration-200 delay-100">
          {{ item.label }}
        </span>

        <!-- Dot activo (visible cuando colapsado) -->
        <span
          class="active-dot absolute left-[58px] w-1 h-1 rounded-full bg-indigo-400 opacity-0 transition-opacity duration-200"></span>

      </a>
    </li>

  </ul>

  <!-- Indicador disponible -->
  <div class="flex items-center gap-2.5 px-2 shrink-0">
    <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse shrink-0"></span>
    <span
      class="text-[11px] text-emerald-400/80 whitespace-nowrap opacity-0 group-hover/nav:opacity-100 transition-opacity duration-200 delay-100 tracking-wide">
      Disponible
    </span>
  </div>

</nav>

            </svg>

            </svg>
            <svg *ngSwitchCase="'contact'" class="w-[18px] h-[18px]" fill="none" stroke="currentColor"
                 stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
            </svg>
          </ng-container>
        </div>

        <span class="text-[10px] font-light tracking-wide">{{ item.label }}</span>

      </a>
    </li>

  </ul>
</nav>
