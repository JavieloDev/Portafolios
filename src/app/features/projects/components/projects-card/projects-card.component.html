<div (click)="openModal(project())"
     class="group relative bg-white/[0.03] border border-white/[0.07] rounded-2xl overflow-hidden cursor-pointer transition-all duration-500 hover:-translate-y-2 hover:border-indigo-400/30">

  <div class="relative overflow-hidden h-52">
    <img [src]="project().image" [alt]="project().title"
         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
    <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-transparent"></div>

    <span
      class="absolute top-3 right-3 px-3 py-1 bg-black/60 backdrop-blur-sm text-white/60 text-[10px] rounded-full border border-white/10">
            {{ project().year }}
          </span>

    <span
      class="absolute bottom-3 left-3 px-3 py-1 bg-indigo-500/20 text-indigo-400 text-[10px] rounded-full border border-indigo-400/20 backdrop-blur-sm">
            {{ project().category === 'work' ? 'Trabajo' : 'Personal' }}
          </span>
  </div>

  <div class="p-6">
    <h3 class="text-lg font-medium text-white mb-1 group-hover:text-indigo-400 transition-colors">
      {{ project().title }}
    </h3>
    <p class="text-sm text-white/30 mb-3">{{ project().subtitle }}</p>
    <p class="text-white/40 text-sm mb-4 line-clamp-2">{{ project().description }}</p>

    <div class="flex flex-wrap gap-1.5">
            <span *ngFor="let tech of project().technologies"
                  class="px-2 py-1 bg-white/5 rounded-full text-[10px] text-white/40 border border-white/5">
              {{ tech }}
            </span>
    </div>

    <div
      class="absolute inset-0 bg-indigo-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
  </div>

  <div
    class="absolute inset-0 rounded-2xl border border-indigo-400/0 group-hover:border-indigo-400/20 transition-all duration-500 pointer-events-none"></div>

  <div
    class="absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-x-2 group-hover:translate-x-0">
    <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
    </svg>
  </div>
</div>


@if (isModalOpen){
  <app-project-details [project]="selectedProject"  (closeDetails)="closeModal()"></app-project-details>
}
