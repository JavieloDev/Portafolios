<section class="relative min-h-screen bg-[#0a0a0a] flex items-center overflow-hidden px-6 md:px-16">
  <div
    class="absolute inset-0 bg-[radial-gradient(ellipse_80%_60%_at_70%_50%,rgba(99,102,241,0.12),transparent)] pointer-events-none"></div>
  <div
    class="absolute inset-0 [background-image:linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.03)_1px,transparent_1px)] [background-size:60px_60px] pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-2xl mx-auto py-20 flex flex-col gap-0">

    <!-- ─── Info de presentación ─── -->
    <div class="flex items-center gap-4 mb-10">
      <div class="relative flex-shrink-0">
        <img src="../../../assets/photo1711825513%20(1).jpeg" alt="Javier Alejandro"
             class="w-14 h-14 rounded-full object-cover ring-2 ring-indigo-500/30">
      </div>
      <div>
        <p class="text-sm font-medium text-white/90 tracking-tight">Javier Alejandro</p>
        <p class="text-xs text-white/40 uppercase tracking-widest">Web Developer</p>
      </div>
      <div
        class="ml-auto flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/25 rounded-full px-3 py-1.5">
        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
        <span class="text-xs text-emerald-400 font-medium tracking-wide">Disponible</span>
      </div>
    </div>

    <h1
      class="font-['Inter'] font-light text-[clamp(2.4rem,6vw,3.6rem)] text-white leading-[1.1] tracking-[-0.03em] mb-4">
      Convierto ideas en<br>
      <em
        class="font-['Playfair_Display'] font-normal bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent italic">experiencias
        digitales</em>
    </h1>

    <p class="text-[15px] text-white/40 font-light leading-relaxed max-w-md mb-8 tracking-wide">
      Desarrollo aplicaciones web modernas que conectan con las personas — rápidas, elegantes y construidas para
      escalar.
    </p>

    <div class="flex gap-3 flex-wrap items-center mb-10">
      <a routerLink="/projects"
         class="inline-flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 text-white text-[13px] font-medium px-5 py-2.5 rounded-lg transition-colors">
        Ver proyectos
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
      <a routerLink="/contact"
         class="inline-flex items-center gap-1.5 text-white/55 hover:text-white/90 text-[13px] px-5 py-2.5 rounded-lg border border-white/10 hover:border-white/25 transition-all">
        Contáctame
      </a>
    </div>

    <div class="h-px bg-white/[0.07] mb-6"></div>

    <!-- ─── Redes y contacto ─── -->
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div class="flex gap-2">

        <!-- WhatsApp -->
        <a [href]="whatsappUrl"
           aria-label="WhatsApp"
           target="_blank"
           rel="noopener noreferrer"
           class="w-9 h-9 rounded-lg bg-white/[0.05] border border-white/[0.08] flex items-center justify-center hover:bg-emerald-500/15 hover:border-emerald-400/40 transition-all group">
          <svg class="w-4 h-4 fill-white/50 group-hover:fill-emerald-400" xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 24 24">
            <path
              d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
        </a>

        <!-- Correo Electrónico -->
        <a
          [href]="emailUrl"
          aria-label="Correo electrónico"
          target="_blank"
          rel="noopener noreferrer"
          class="w-9 h-9 rounded-lg bg-white/[0.05] border border-white/[0.08] flex items-center justify-center hover:bg-indigo-500/15 hover:border-indigo-400/40 transition-all group">
          <svg class="w-4 h-4 fill-white/50 group-hover:fill-indigo-400" xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 24 24">
            <path d="M1.5 8.67v8.58a3 3 0 003 3h15a3 3 0 003-3V8.67l-8.928 5.493a3 3 0 01-3.144 0L1.5 8.67z"/>
            <path d="M22.5 6.908V6.75a3 3 0 00-3-3h-15a3 3 0 00-3 3v.158l9.714 5.978a1.5 1.5 0 001.572 0L22.5 6.908z"/>
          </svg>
        </a>

        <!-- LinkedIn -->
        <a [href]="linkedInURL"
           aria-label="LinkedIn"
           target="_blank"
           rel="noopener noreferrer"
           class="w-9 h-9 rounded-lg bg-white/[0.05] border border-white/[0.08] flex items-center justify-center hover:bg-indigo-500/15 hover:border-indigo-400/40 transition-all group">
          <svg class="w-4 h-4 fill-white/50 group-hover:fill-indigo-400" xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 50 50">
            <path
              d="M41,4H9C6.24,4,4,6.24,4,9v32c0,2.76,2.24,5,5,5h32c2.76,0,5-2.24,5-5V9C46,6.24,43.76,4,41,4z M17,20v19h-6V20H17z M11,14.47c0-1.4,1.2-2.47,3-2.47s2.93,1.07,3,2.47c0,1.4-1.12,2.53-3,2.53C12.2,17,11,15.87,11,14.47z M39,39h-6c0,0,0-9.26,0-10c0-2-1-4-3.5-4.04h-0.08C27,24.96,26,27.02,26,29c0,0.91,0,10,0,10h-6V20h6v2.56c0,0,1.93-2.56,5.81-2.56c3.97,0,7.19,2.73,7.19,8.26V39z"/>
          </svg>
        </a>

      </div>
    </div>

  </div>
</section>
