<section class="relative min-h-screen bg-[#0a0a0a] flex items-start justify-center px-6 md:px-16 py-20 overflow-hidden">

  <!-- Fondo decorativo -->
  <div
    class="absolute inset-0 bg-[radial-gradient(ellipse_80%_60%_at_60%_40%,rgba(99,102,241,0.1),transparent)] pointer-events-none"></div>
  <div
    class="absolute inset-0 [background-image:linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.03)_1px,transparent_1px)] [background-size:60px_60px] pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-2xl flex flex-col">

    <!-- Eyebrow -->
    <div class="inline-flex items-center gap-2 text-[11px] uppercase tracking-[0.15em] text-white/35 mb-7">
      <span class="w-1 h-1 rounded-full bg-indigo-400"></span>
      Habilidades
    </div>

    <!-- Heading -->
    <h2 class="font-['Inter'] font-light text-[clamp(2rem,5vw,3rem)] text-white leading-[1.1] tracking-[-0.03em] mb-10">
      Lo que sé<br>
      <em class="font-['Playfair_Display'] italic font-normal bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">hacer bien</em>
    </h2>

    <!-- ── Soft skills ── -->
    <p class="text-[11px] uppercase tracking-[0.12em] text-white/30 mb-4">Competencias</p>

    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-8">

      <div *ngFor="let skill of softSkills"
           class="skill-card group bg-white/[0.03] border border-white/[0.07] rounded-xl p-4 flex flex-col items-center gap-3 cursor-default transition-all duration-300 hover:border-indigo-500/40 hover:bg-indigo-500/[0.06] hover:-translate-y-1">
        <!-- SVG icon via ng-container switch -->
        <div
          class="w-10 h-10 rounded-lg bg-white/[0.05] border border-white/[0.07] flex items-center justify-center group-hover:border-indigo-400/40 transition-colors duration-300">
          <ng-container [ngSwitch]="skill.id">

            <!-- web-design -->
            <svg *ngSwitchCase="'web-design'" xmlns="http://www.w3.org/2000/svg"
                 class="w-5 h-5 transition-colors duration-300 fill-white/40 group-hover:fill-indigo-400"
                 viewBox="0 0 24 24">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>

            <!-- front-end -->
            <svg *ngSwitchCase="'front-end'" xmlns="http://www.w3.org/2000/svg"
                 class="w-5 h-5 transition-colors duration-300 fill-white/40 group-hover:fill-indigo-400"
                 viewBox="0 0 24 24">
              <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/>
            </svg>

            <!-- back-end -->
            <svg *ngSwitchCase="'back-end'" xmlns="http://www.w3.org/2000/svg"
                 class="w-5 h-5 transition-colors duration-300 fill-white/40 group-hover:fill-indigo-400"
                 viewBox="0 0 24 24">
              <path
                d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/>
            </svg>

            <!-- design-thinking -->
            <svg *ngSwitchCase="'design-thinking'" xmlns="http://www.w3.org/2000/svg"
                 class="w-5 h-5 transition-colors duration-300 fill-white/40 group-hover:fill-indigo-400"
                 viewBox="0 0 24 24">
              <path
                d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zm2 14H10v-1h4v1zm0-3H10v-1h4v1zm-2-3C9.24 10 7 7.76 7 5h2c0 1.66 1.34 3 3 3s3-1.34 3-3h2c0 2.76-2.24 5-5 5z"/>
            </svg>

            <!-- problem-solving -->
            <svg *ngSwitchCase="'problem-solving'" xmlns="http://www.w3.org/2000/svg"
                 class="w-5 h-5 transition-colors duration-300 fill-white/40 group-hover:fill-indigo-400"
                 viewBox="0 0 24 24">
              <path
                d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/>
            </svg>

            <!-- computer-literacy -->
            <svg *ngSwitchCase="'computer-literacy'" xmlns="http://www.w3.org/2000/svg"
                 class="w-5 h-5 transition-colors duration-300 fill-white/40 group-hover:fill-indigo-400"
                 viewBox="0 0 24 24">
              <path
                d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7l-2 3v1h8v-1l-2-3h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H3V4h18v10z"/>
            </svg>

          </ng-container>
        </div>

        <span
          class="text-[12px] text-white/50 group-hover:text-white/80 tracking-wide transition-colors duration-300 text-center">{{ skill.name }}</span>
      </div>

    </div>

    <!-- Divisor -->
    <div class="h-px bg-white/[0.07] mb-8"></div>

    <!-- ── Technical skills con barras ── -->
    <p class="text-[11px] uppercase tracking-[0.12em] text-white/30 mb-6">Stack técnico</p>

    <div class="flex flex-col gap-4 mb-8">

      <div *ngFor="let tech of techSkills" class="flex flex-col gap-1.5">
        <div class="flex items-center justify-between">
          <span class="text-[13px] text-white/60 tracking-wide">{{ tech.name }}</span>
          <span class="text-[11px] text-indigo-400/70 font-medium">{{ tech.level }}%</span>
        </div>
        <div class="h-px bg-white/[0.07] rounded-full overflow-hidden">
          <div class="h-full rounded-full bar-fill"
               [style.width]="animating ? tech.level + '%' : '0%'"
               [ngClass]="tech.color">
          </div>
        </div>
      </div>

    </div>

    <!-- Divisor -->
    <div class="h-px bg-white/[0.07] mb-8"></div>

    <!-- ── Lenguajes / tecnologías pills ── -->
    <p class="text-[11px] uppercase tracking-[0.12em] text-white/30 mb-4">Tecnologías</p>

    <div class="flex flex-wrap gap-2">
      <span *ngFor="let tag of tags"
            class="text-[11px] text-white/30 bg-white/[0.04] border border-white/[0.07] rounded px-2.5 py-1 tracking-wide hover:text-indigo-400/90 hover:border-indigo-500/35 transition-all duration-200 cursor-default">
        {{ tag }}
      </span>
    </div>

  </div>
</section>
